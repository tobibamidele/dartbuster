name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ""
          - os: windows-latest
            platform: windows
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Compile binary
        run: |
          dart compile exe bin/main.dart -o dartbuster-${{ matrix.platform }}${{ matrix.ext }}

      - name: Generate checksum (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sha256sum dartbuster-${{ matrix.platform }}${{ matrix.ext }} > dartbuster-${{ matrix.platform }}.sha256

      - name: Generate checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $file="dartbuster-${{ matrix.platform }}${{ matrix.ext }}"
          $hash=(Get-FileHash $file -Algorithm SHA256).Hash
          "$hash  $file" | Out-File "dartbuster-${{ matrix.platform }}.sha256" -Encoding ascii

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dartbuster-${{ matrix.platform }}
          path: |
            dartbuster-${{ matrix.platform }}${{ matrix.ext }}
            dartbuster-${{ matrix.platform }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: dist/**/*

name: dartbuster
description: >
  A high-performance web content discovery tool written in Dart.
  Inspired by GoBuster — built for speed, extensibility, and modern red team workflows.
version: 0.1.0
repository: https://github.com/tobibamidele/dartbuster

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  args: ^2.4.2
  http: ^1.2.1
  # Used for DNS-based subdomain enumeration
  # dart:io's InternetAddress.lookup is used directly for raw DNS
  ansi_styles: ^0.3.1
  path: ^1.9.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0

executables:
  dartbuster: main
